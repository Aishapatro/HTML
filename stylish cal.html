<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylish Calculator</title>

    <style>

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#1e1e2f;
            font-family:Arial, sans-serif;
        }

        .calculator{
            background:#2c2c3c;
            padding:20px;
            border-radius:20px;
            box-shadow:0px 0px 20px rgba(0,0,0,0.5);
        }

        #display{
            width:100%;
            height:60px;
            border:none;
            outline:none;
            margin-bottom:15px;
            font-size:28px;
            text-align:right;
            padding-right:10px;
            border-radius:10px;
            background:#f4f4f4;
        }

        .buttons{
            display:grid;
            grid-template-columns:repeat(4,70px);
            gap:10px;
        }

        button{
            height:70px;
            border:none;
            border-radius:15px;
            font-size:22px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:scale(1.05);
        }

        .number{
            background:#4e4e6a;
            color:white;
        }

        .operator{
            background:#ff9f43;
            color:white;
        }

        .equal{
            background:#00b894;
            color:white;
        }

        .clear{
            background:#d63031;
            color:white;
        }

    </style>
</head>

<body>

    <div class="calculator">

        <input type="text" id="display" readonly>

        <div class="buttons">

            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="appendValue('/')">/</button>
            <button class="operator" onclick="appendValue('*')">*</button>
            <button class="operator" onclick="appendValue('-')">-</button>

            <button class="number" onclick="appendValue('7')">7</button>
            <button class="number" onclick="appendValue('8')">8</button>
            <button class="number" onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('+')">+</button>

            <button class="number" onclick="appendValue('4')">4</button>
            <button class="number" onclick="appendValue('5')">5</button>
            <button class="number" onclick="appendValue('6')">6</button>
            <button class="equal" onclick="calculate()">=</button>

            <button class="number" onclick="appendValue('1')">1</button>
            <button class="number" onclick="appendValue('2')">2</button>
            <button class="number" onclick="appendValue('3')">3</button>
            <button class="number" onclick="appendValue('.')">.</button>

            <button class="number" onclick="appendValue('0')">0</button>

        </div>

    </div>

    <script>

        function appendValue(value){
            document.getElementById("display").value += value;
        }

        function clearDisplay(){
            document.getElementById("display").value = "";
        }

        function calculate(){
            let result = eval(document.getElementById("display").value);
            document.getElementById("display").value = result;
        }

    </script>

</body>

</html>
